services:
  maindatabase:
    image: postgres:18
    container_name: maindatabase
    ports:
      - "35432:5432"
    environment:
      POSTGRES_DB: jbof
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - "./docker/postgres:/var/lib/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d jbof"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
  keycloak-postgres:
    image: postgres:18
    container_name: keycloak-postgres
    ports:
      - "35433:5432"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - "./docker/keycloak/postgres:/var/lib/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    container_name: keycloak
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - "./keycloak/import:/opt/keycloak/data/import:ro"
    command:
      - start-dev
      - --import-realm
    restart: unless-stopped
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672" # RabbitMQ AMQP
      - "15672:15672" # RabbitMQ Web UI # TODO: delete for prod
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9002:9000" # MinIO S3 API
      - "9003:9001" # MinIO Console UI TODO: DELETE FOR PROD
    volumes:
      - ./docker/minio:/data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    restart: unless-stopped
