<header class="header">
  <nav class="nav">
    @if (isAuthenticated()) {
      <a routerLink="/images" routerLinkActive="active" ariaCurrentWhenActive="page">All images</a>
    }

    @if (canUpload()) {
      <a routerLink="/upload" routerLinkActive="active" ariaCurrentWhenActive="page">Upload image</a>
    }
  </nav>

  <div class="auth-actions">
    @if (isAuthenticated()) {
      <span>{{ username() }}</span>
      <button type="button" (click)="logout()">Logout</button>
    } @else {
      <button type="button" (click)="login()">Login</button>
    }
  </div>
</header>
