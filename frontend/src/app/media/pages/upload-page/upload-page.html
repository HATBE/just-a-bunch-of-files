<section class="page">
  <h1>Upload files</h1>

  <label class="field">
    <span>Album IDs (comma separated, optional)</span>
    <input [ngModel]="albumIds()" (ngModelChange)="albumIds.set($event)" type="text" />
  </label>

  <label class="field">
    <span>Files</span>
    <input
      type="file"
      accept=".jpg,.jpeg,.png,.gif,.webp,.bmp,.svg,.mp4,.mov,.webm,.avi,.mkv,image/*,video/*"
      multiple
      (change)="onFileSelected($event)"
    />
  </label>

  @if (selectedFiles.length > 0) {
    <p>{{ selectedFiles.length }} file(s) selected</p>
    <p>{{ getBatchCount() }} upload batch(es)</p>
  }

  <button type="button" (click)="upload()" [disabled]="isUploading()">
    {{ isUploading() ? 'Uploading...' : 'Upload' }}
  </button>

  @if (errorMessage()) {
    <p>{{ errorMessage() }}</p>
  }

  @if (successMessage()) {
    <p>{{ successMessage() }}</p>
  }
</section>
