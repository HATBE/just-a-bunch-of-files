<li class="dropdown nav-item">
  <span class="dropdown-toggle text-decoration-none user-select-none nav-link link-light fw-bold cursor-pointer" data-bs-toggle="dropdown" aria-expanded="false">
    <fa-icon class="me-1" [icon]="faUser"></fa-icon><span>Account</span>
  </span>
  <ul class="dropdown-menu dropdown-menu-dark user-select-none shadow">
    <li class="d-flex flex-column justify-content-start align-items-center fw-bold">
      <div class="overflow-hidden ratio ratio-1x1 rounded profile-picture-size">
        <img draggable="false" src="/assets/pb.jpg" class="object-fit-cover w-100 user-select-none">
      </div>
      <div class="m-2 h6">{{loggedInUser?.username}}</div>
    </li>
    <hr class="m-0 py-1 text-secondary">
    <li><a draggable="false" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" routerLink="/users/profile/{{loggedInUser?.id}}" class="fw-bold dropdown-item"><fa-icon class="me-2" [icon]="faUser"></fa-icon>Mein Profil</a></li>
    <li><a draggable="false" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" routerLink="/users/settings" class="fw-bold dropdown-item"><fa-icon class="me-2" [icon]="faGear"></fa-icon>Einstellungen</a></li>
    <li><a draggable="false" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class=" text-danger fw-bold dropdown-item cursor-pointer hover-danger" (click)="logout()"><fa-icon class="me-2" [icon]="faRightFromBracket"></fa-icon>Ausloggen</a></li>
  </ul>
</li>
