<div class="container my-3">
  <div class="row">
    <div class="col-12 col-sm-12 col-md-6 offset-md-3 col-xl-4 offset-xl-4">
      <div class="card bg-dark rounded overflow-hidden shadow text-light">
        <div class="card-body">
          <h3 class="text-center mt-2">Register</h3>
          <p class="text-center text-secondary">Register an account</p>
          <div class="d-flex flex-column align-items-center">
            <form class="w-85 mt-5 mb-4" [formGroup]="form" (submit)="onSubmitRegister()">
              <div class="w-100 alert alert-danger" *ngIf="error">
                <span class="fw-bold">Error!</span> {{error}}
              </div>
              <div class="mb-3">
                <label>Username</label>
                <input formControlName="username" type="text" class="form-control" placeholder="Username">
              </div>
              <div class="mb-3">
                <label>E-Mail</label>
                <input formControlName="email" type="email" class="form-control" placeholder="E-Mail">
              </div>
              <div class="mb-3">
                <label>Password</label>
                <input formControlName="password" type="password" class="form-control" placeholder="Password">
              </div>
              <div class="mb-3">
                <label>Repeat Password</label>
                <input formControlName="repeatPassword" type="password" class="form-control" placeholder="Repeat Password">
              </div>
              <div class="my-4">
                <button type="submit" class="w-100 btn btn-primary">
                  <ng-container *ngIf="isLoading"><app-loading-spinner></app-loading-spinner></ng-container>
                  <ng-container *ngIf="!isLoading">Register</ng-container>
                </button>
              </div>
              <!--<div class="my-2">
                <div class="form-check">
                  <input formControlName="checkedTerms" class="form-check-input" type="checkbox" id="flexCheckDefault">
                  <label class="form-check-label user-select-none fw-light text-secondary" for="flexCheckDefault">
                    Ich bestätige, dass ich die <a routerLink='/info/agb' class='link-secondary' target='_blank'>Allgemeinen Geschäftsbedingungen</a> von Riders Gallery gelesen habe und mich damit einverstanden erkläre, ihnen zu folgen.
                  </label>
                </div>
                </div>-->
            </form>
          </div>
          <div class="d-flex justify-content-between">
            <div></div>
            <a draggable="false" class="user-select-none mt-3 d-block link-secondary text-decoration-none" routerLink="/auth/login">Log in to your account</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
