<div class="container my-3">
  <div class="row">
    <div class="col-12 col-sm-12 col-md-6 offset-md-3 col-xl-4 offset-xl-4">
      <div class="card bg-dark rounded overflow-hidden shadow text-light">
        <div class="card-body">
          <h3 class="text-center mt-2">Register</h3>
          <p class="text-center text-secondary">Register an account</p>
          <div class="d-flex flex-column align-items-center">
            <form class="w-85 mt-5 mb-4">
              <div class="mb-3">
                <label>Username</label>
                <input type="text" class="form-control" placeholder="Username">
              </div>
              <div class="mb-3">
                <label>E-Mail</label>
                <input type="email" class="form-control" placeholder="E-Mail">
              </div>
              <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" placeholder="Password">
              </div>
              <div class="my-4">
                <button class="w-100 btn btn-primary">Register</button>
              </div>
            </form>
          </div>
          <div class="d-flex justify-content-between">
            <div></div>
            <a class="mt-3 d-block link-secondary text-decoration-none" routerLink="/auth/login">Log in to your account</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
