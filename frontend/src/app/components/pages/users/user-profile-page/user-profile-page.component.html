<div class="container">
  <!-- if loading -->
  <app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

  <!-- if not loading but error -->
  <ng-container *ngIf="!isLoading && error">
    <div class="alert alert-danger">
      {{error}}
    </div>
  </ng-container>

  <ng-container *ngIf="!isLoading && !error">

    <div class="mb-3">

      <a draggable="false" routerLink="/users/list" class="mx-1">
        <button class="btn btn-secondary"><fa-icon [icon]="faCaretLeft"></fa-icon> Back</button>
      </a>

      <a draggable="false" *ngIf="yourself" routerLink="/users/settings/profile" class="mx-1">
        <button class="btn btn-primary"><fa-icon [icon]="faPen"></fa-icon> Profil bearbeiten</button>
      </a>

    </div>

    <div class="bg-dark card rounded overflow-hidden shadow text-light mb-3">
      <div class="card-body d-flex flex-column p-0">
        <div class="profile-card p-3">
          <div class="d-flex align-items-center">
            <div class="overflow-hidden ratio ratio-1x1 rounded profile-picture-size border border-3 border-dark">
              <img draggable="false" src="/assets/pb.jpg" class="object-fit-cover w-100 h-100 user-select-none">
            </div>
            <div class="ms-4">
              <h4>{{data.user.username}}</h4>
              <p>134 Followers - 12 Following</p>
            </div>
          </div>
          <div *ngIf="!yourself" class="follow-button"><!-- TODO:! -->
            <button class="btn btn-success"><fa-icon [icon]="faUserPlus"></fa-icon> <span class="d-none d-md-inline-block ms-2">User folgen</span></button>
          </div>
        </div>
        <nav>
          <ul class="tab-nav nav user-select-none fw-bold">
            <li class="nav-item">
              <div class="nav-link text-light cursor-pointer" [ngClass]="{'active': tab == 'feed'}" (click)="switchTab('feed')">
                <fa-icon class="me-1" [icon]="faBars"></fa-icon> Feed
              </div>
            </li>
            <li class="nav-item">
              <div class="nav-link text-light cursor-pointer" [ngClass]="{'active': tab == 'about'}" (click)="switchTab('about')">
                <fa-icon class="me-1" [icon]="faAddressCard"></fa-icon> Über mich
              </div>
            </li>
            <li class="nav-item">
              <div class="nav-link text-light cursor-pointer" [ngClass]="{'active': tab == 'friends'}" (click)="switchTab('friends')">
                <fa-icon class="me-1" [icon]="faUsers"></fa-icon> Freunde
              </div>
            </li>
            <li class="nav-item">
              <div class="nav-link text-light cursor-pointer" [ngClass]="{'active': tab == 'bikes'}" (click)="switchTab('bikes')">
                <fa-icon class="me-1" [icon]="faMotorcycle"></fa-icon> Garage
              </div>
            </li>
          </ul>
        </nav>
      </div>
    </div>

    <div class="row g-3">

      <div class="col-12 col-sm-12 col-md-5 col-xl-3">
        <!-- RIGHT -->
        <div class="card bg-dark rounded overflow-hidden shadow text-light">
          <div class="card-body">
            TODO:
          </div>
        </div>
      </div>

      <div class="col-12 col-sm-12 col-md-7 col-xl-9">
        <!-- LEFT -->
        <div class="card bg-dark rounded overflow-hidden shadow text-light">
          <div class="card-body">
            <div [ngSwitch]="tab">
              <div *ngSwitchCase="'feed'">
                <app-user-profile-feed-tab [userId]="data.user.id"></app-user-profile-feed-tab>
              </div>
              <div *ngSwitchCase="'about'">
                <app-user-profile-about-tab [userId]="data.user.id"></app-user-profile-about-tab>
              </div>
              <div *ngSwitchCase="'friends'">
                <app-user-profile-friends-tab [userId]="data.user.id"></app-user-profile-friends-tab>
              </div>
              <div *ngSwitchCase="'bikes'">
                <app-user-profile-bikes-tab [userId]="data.user.id"></app-user-profile-bikes-tab>
              </div>
              <div *ngSwitchDefault>Tab not found!</div>
            </div>
          </div>
        </div>
      </div>

    </div>

  </ng-container>
</div>
