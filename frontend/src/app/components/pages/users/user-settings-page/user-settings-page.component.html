<div class="container">
  <div class="card bg-dark rounded overflow-hidden shadow text-light mb-3">
    <div class="card-body">
      <h5>Settings</h5>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-12 col-md-3">
      <div class="card bg-dark rounded overflow-hidden shadow text-light">
        <div class="card-body">
          <nav>
            <ul class="tab-nav nav user-select-none fw-bold d-flex flex-column">
              <li class="nav-item">
                <div class="nav-link text-light cursor-pointer" [ngClass]="{'active': tab == 'personal'}" (click)="switchTab('personal')">Persönlich</div>
              </li>
              <li class="nav-item">
                <div class="nav-link text-light cursor-pointer" [ngClass]="{'active': tab == 'change-pw'}" (click)="switchTab('change-pw')">Password ändern</div>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-9">
      <div class="card bg-dark rounded overflow-hidden shadow text-light">
        <div class="card-body">

          <div [ngSwitch]="tab">
            <div *ngSwitchCase="'change-pw'">
              <app-reset-pw-form></app-reset-pw-form>
            </div>
            <div *ngSwitchCase="'personal'">
              Persönlich
            </div>
            <div *ngSwitchDefault>Tab not found!</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
