server.port=8080
spring.application.name=JBOF-Backend

# multipart limits
spring.servlet.multipart.max-file-size=100GB
spring.servlet.multipart.max-request-size=100GB
server.tomcat.max-http-form-post-size=100GB
server.tomcat.max-swallow-size=-1

# postgres
spring.datasource.url=jdbc:postgresql://localhost:35432/jbof
spring.datasource.username=user
spring.datasource.password=password

# jpa / hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# optional, usually Hibernate can detect it anyway
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# MinIO / S3
storage.s3.endpoint=http://localhost:9002
storage.s3.access-key=minio
storage.s3.secret-key=minio123
storage.s3.region=us-east-1
storage.s3.path-style=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.template.mandatory=true

app.rabbitmq.default-exchange=
app.rabbitmq.default-routing-key=
app.rabbitmq.receive-timeout=3000
app.rabbitmq.media-processing-queue=media.processing